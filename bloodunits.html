<!DOCTYPE html>
<html ng-app="bloodApp">

<head>

<title>Blood Inventory</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="app.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body ng-controller="bloodController">

<h1>Blood Inventory</h1>

<table>

<tr>
<th>Unit No</th>
<th>Blood Group</th>
<th>Status</th>
</tr>

<tr ng-repeat="b in bloodunits">

<td>{{b.unitNo}}</td>
<td>{{b.bloodGroup}}</td>
<td>{{b.status}}</td>

</tr>

</table>

</body>
</html>
